<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedsssMessenger — RedsssProduction Studios</title>
  <link rel="icon" href="images/logo.jpg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>
<body class="messenger-page">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-logo">RedsssProduction Studios</div>
    <div class="loader-spinner"></div>
  </div>

  <!-- App (shown after auth confirms) -->
  <div id="app" style="display:none">

    <nav class="navbar">
      <div class="nav-brand">
        <img src="images/logo.jpg" alt="RedsssProduction Studios">
        <span class="brand-text">RedsssProduction Studios</span>
      </div>
      <div class="nav-links">
        <a class="nav-link" data-page="home" href="index.html">Home</a>
        <a class="nav-link" data-page="games" href="games.html">Games</a>
        <a class="nav-link" data-page="messenger" href="messenger.html">RedsssMessenger</a>
        <a class="nav-link" data-page="support" href="support.html">Support</a>
      </div>
      <div class="nav-right">
        <div class="notif-wrapper">
          <button class="notif-bell" id="notif-bell" title="Notifications">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          <span class="notif-badge" id="notif-badge">0</span>
          <div class="notif-dropdown" id="notif-dropdown">
            <div class="notif-dropdown-header">Notifications</div>
            <div id="notif-list"><div class="notif-empty">No notifications</div></div>
          </div>
        </div>
        <div class="nav-avatar-wrapper">
          <div class="nav-avatar" id="nav-avatar" title="Profile"></div>
          <span class="status-dot" id="nav-status-dot"></span>
        </div>
        <span class="nav-username" id="nav-username"></span>
      </div>
    </nav>

    <!-- Profile Dropdown -->
    <div class="profile-dropdown" id="profile-dropdown">
      <div class="profile-dd-header">
        <div class="profile-dd-avatar" id="profile-dd-avatar"></div>
        <div>
          <div class="profile-dd-name" id="profile-dd-name"></div>
          <input class="profile-dd-username-input" id="profile-dd-name-input" minlength="3" maxlength="20" placeholder="Username" style="display:none">
          <div class="profile-dd-email" id="profile-dd-email"></div>
        </div>
      </div>
      <div class="profile-dd-section">
        <label>Status</label>
        <select class="profile-dd-select" id="profile-status">
          <option value="auto">Auto</option>
          <option value="online">Online</option>
          <option value="away">Away</option>
          <option value="dnd">Do Not Disturb</option>
          <option value="offline">Offline</option>
        </select>
      </div>
      <input type="file" id="avatar-upload" accept="image/*" style="display:none">
      <a href="friends.html" class="btn btn-sm btn-full" style="display:block;text-align:center;border:1px solid var(--border);color:var(--text-secondary);margin-bottom:8px;text-decoration:none">Friends</a>
      <button class="btn btn-primary btn-sm btn-full" id="save-profile-btn">Save Changes</button>
      <button class="btn-logout" id="btn-logout">Log Out</button>
    </div>

    <!-- Messenger Layout -->
    <div id="messenger-app">

    <!-- Server Strip (far left) -->
    <div class="server-strip">
      <div class="server-icon active" id="dm-btn" title="Direct Messages">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
      <div class="server-divider"></div>
      <div id="server-list"></div>
      <div class="server-divider"></div>
      <div class="server-icon" id="discover-btn" title="Discover Servers">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </div>
      <div class="server-icon add" id="create-server-btn" title="Create Server">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header" id="sidebar-header">Direct Messages</div>

      <!-- DM View -->
      <div class="sidebar-section" id="dm-section">
        <div class="sidebar-search">
          <input class="form-input" id="friend-search" placeholder="Search friends..." maxlength="20">
        </div>
        <div id="friends-list"><div class="sidebar-empty">No friends yet</div></div>
      </div>

      <!-- Channel View -->
      <div class="sidebar-section" id="channel-section" style="display:none">
        <div id="channel-list"></div>
        <button class="btn btn-primary btn-sm btn-full" id="create-channel-btn" style="margin:12px 10px;width:calc(100% - 20px)">+ Channel</button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header" id="chat-header">
        <span id="chat-title">Select a conversation</span>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">Select a friend or channel to start chatting</div>
      </div>
      <div class="chat-input-bar" id="chat-input-bar" style="display:none">
        <input class="chat-input" id="chat-input" placeholder="Type a message..." maxlength="2000">
        <button class="chat-send" id="chat-send">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- Members Sidebar (for servers) -->
    <div class="members-sidebar" id="members-sidebar" style="display:none">
      <div class="members-header">Members</div>
      <div id="members-list"></div>
    </div>
    </div><!-- /messenger-app -->

    <!-- Create Server Modal -->
  <div class="modal-overlay" id="create-server-modal">
    <div class="modal">
      <h3>Create a Server</h3>
      <div class="form-group">
        <label>Server Name</label>
        <input class="form-input" id="server-name-input" placeholder="My Server" minlength="3" maxlength="50">
      </div>
      <div class="form-group">
        <label>Description <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
        <input class="form-input" id="server-desc-input" placeholder="What's this server about?" maxlength="200">
      </div>
      <div class="form-group">
        <label>Server Image <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
        <div class="server-img-upload" id="server-img-preview" title="Click to upload">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <input type="file" id="server-img-input" accept="image/*" style="display:none">
      </div>
      <div class="form-group">
        <label>Visibility</label>
        <div class="visibility-toggle">
          <button class="visibility-opt active" data-value="public" id="vis-public">Public</button>
          <button class="visibility-opt" data-value="private" id="vis-private">Private</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancel-server-btn">Cancel</button>
        <button class="btn btn-primary" id="confirm-server-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Create Channel Modal -->
  <div class="modal-overlay" id="create-channel-modal">
    <div class="modal">
      <h3>Create a Channel</h3>
      <div class="form-group">
        <label>Channel Name</label>
        <input class="form-input" id="channel-name-input" placeholder="general" minlength="1" maxlength="30">
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancel-channel-btn">Cancel</button>
        <button class="btn btn-primary" id="confirm-channel-btn">Create</button>
      </div>
    </div>
  </div>

  </div><!-- /app -->

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="js/cropper-util.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/messenger.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Nav.init('messenger').then(({ user, profile }) => Messenger.init(user, profile));
    });
  </script>
</body>
</html>

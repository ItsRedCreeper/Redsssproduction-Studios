<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger — RedsssProduction Studios</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="science_data_portal_fav_icon.png">
  <style>
    body { overflow: hidden; }

    .messenger-layout {
      display: flex;
      height: 100vh;
    }

    /* Server list (far left icon strip) */
    .server-strip {
      width: 60px;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 6px;
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .server-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      overflow: hidden;
      flex-shrink: 0;
    }

    .server-icon:hover, .server-icon.active {
      border-radius: 12px;
      background: var(--red-primary);
      color: #fff;
    }

    .server-icon img { width: 100%; height: 100%; object-fit: cover; }

    .server-icon.dm-icon { background: var(--red-dark); }

    .server-add {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--success);
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }

    .server-add:hover { background: var(--success); color: #fff; border-radius: 12px; }

    .server-divider {
      width: 32px;
      height: 2px;
      background: var(--border-color);
      border-radius: 1px;
    }

    /* Channel sidebar */
    .channel-sidebar {
      width: 220px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .channel-header {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .channel-header .server-settings {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
    }

    .channel-header .server-settings:hover { color: var(--text-primary); }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      transition: var(--transition);
    }

    .channel-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .channel-item.active { background: var(--bg-tertiary); color: var(--text-primary); }
    .channel-item .hash { color: var(--text-muted); font-weight: 700; }

    .dm-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .dm-item:hover { background: var(--bg-hover); }
    .dm-item.active { background: var(--bg-tertiary); }

    .dm-item .friend-avatar { width: 32px; height: 32px; font-size: 13px; }
    .dm-item .name { font-size: 14px; }

    .channel-user-area {
      padding: 10px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .channel-user-area .friend-avatar { width: 30px; height: 30px; font-size: 12px; }

    .btn-back-home {
      margin: 8px;
      padding: 8px;
      font-size: 13px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: center;
    }

    .btn-back-home:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .chat-header .hash { color: var(--text-muted); font-size: 20px; font-weight: 700; }
    .chat-header .channel-name { font-size: 15px; font-weight: 600; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      display: flex;
      gap: 12px;
      padding: 6px 0;
      border-radius: var(--radius-sm);
    }

    .message:hover { background: var(--bg-hover); }

    .message .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--red-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }

    .message .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .msg-content { flex: 1; min-width: 0; }

    .msg-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .msg-author {
      font-size: 14px;
      font-weight: 600;
      color: var(--red-light);
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .msg-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.4;
      word-break: break-word;
      margin-top: 2px;
    }

    .msg-text img {
      max-width: 300px;
      max-height: 300px;
      border-radius: var(--radius-sm);
      margin-top: 6px;
      display: block;
    }

    .msg-actions {
      display: none;
      gap: 4px;
      margin-top: 4px;
    }

    .message:hover .msg-actions { display: flex; }

    .msg-actions button {
      padding: 2px 8px;
      font-size: 11px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      background: var(--bg-tertiary);
      color: var(--text-muted);
    }

    .msg-actions button:hover { color: var(--text-primary); }

    /* Chat input */
    .chat-input-area {
      padding: 12px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 4px 12px;
    }

    .chat-input-wrapper:focus-within { border-color: var(--red-primary); }

    .chat-input-wrapper input[type="file"] { display: none; }

    .chat-input-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .chat-input-btn:hover { color: var(--text-primary); }

    #chat-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      padding: 8px 0;
      outline: none;
      font-family: inherit;
    }

    #chat-input::placeholder { color: var(--text-muted); }

    /* Members sidebar */
    .members-sidebar {
      width: 200px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      overflow-y: auto;
      padding: 12px;
      flex-shrink: 0;
    }

    .members-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 4px;
      letter-spacing: 0.5px;
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .member-item:hover { background: var(--bg-hover); }
    .member-item .friend-avatar { width: 28px; height: 28px; font-size: 12px; }
    .member-item .name { font-size: 13px; }

    /* Empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 16px;
    }

    /* Create server modal */
    .create-server-form { display: flex; flex-direction: column; gap: 12px; }
    .create-server-form input {
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    .create-server-form input:focus { border-color: var(--red-primary); }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader-logo">RedsssProduction Studios</div>
    <div class="loader-spinner"></div>
  </div>

  <!-- Messenger Layout -->
  <div class="messenger-layout" id="messenger-app" style="display:none">

    <!-- Server Strip -->
    <div class="server-strip">
      <div class="server-icon dm-icon active" id="dm-tab" title="Direct Messages">💬</div>
      <div class="server-divider"></div>
      <div id="server-icons"></div>
      <button class="server-add" id="create-server-btn" title="Create Server">+</button>
    </div>

    <!-- Channel Sidebar -->
    <div class="channel-sidebar">
      <div class="channel-header">
        <span id="sidebar-title">Direct Messages</span>
        <span class="server-settings" id="server-settings-btn" style="display:none" title="Settings">⚙</span>
      </div>
      <div class="channel-list" id="channel-list"></div>
      <div class="btn-back-home" onclick="window.location.href='index.html'">← Back to Home</div>
      <div class="channel-user-area">
        <div class="friend-avatar" id="msg-user-avatar"></div>
        <span id="msg-user-name"></span>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header" id="chat-header" style="display:none">
        <span class="hash">#</span>
        <span class="channel-name" id="chat-channel-name"></span>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">Select a conversation to start chatting</div>
      </div>
      <div class="chat-input-area" id="chat-input-area" style="display:none">
        <div class="chat-input-wrapper">
          <button class="chat-input-btn" id="attach-btn" title="Upload image">📎</button>
          <input type="file" id="chat-file-input" accept="image/*">
          <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
          <button class="chat-input-btn" id="emoji-btn" title="Emoji">😀</button>
        </div>
      </div>
    </div>

    <!-- Members Sidebar (for servers) -->
    <div class="members-sidebar" id="members-sidebar" style="display:none">
      <div class="members-title">Members</div>
      <div id="members-list"></div>
    </div>
  </div>

  <!-- Create Server Modal -->
  <div class="modal-overlay" id="create-server-modal">
    <div class="modal">
      <h3>Create a Server</h3>
      <div class="create-server-form">
        <input id="server-name-input" placeholder="Server name" maxlength="50">
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="document.getElementById('create-server-modal').classList.remove('active')">Cancel</button>
        <button class="btn btn-primary" id="confirm-create-server">Create</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/messenger.js"></script>
  <script>
      document.addEventListener('keydown', function(e) {
          if (e.ctrlKey && e.key === 'j') {
              e.preventDefault();
              window.location.href = 'https://sciencedataportal.com';
          }
      });
  </script>
</body>
</html>

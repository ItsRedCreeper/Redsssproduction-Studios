<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Core</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
      overflow: hidden;
    }
    #core-video {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    #start-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }
    #start-ui h2 { margin: 0; font-size: 1.3rem; }
    #start-ui p { margin: 0; color: #aaa; font-size: 0.9rem; }
    #idle-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      padding: 32px;
    }
    #idle-ui h2 { margin: 0; font-size: 1.3rem; }
    #idle-ui p { margin: 0; color: #aaa; font-size: 0.9rem; }
    #status {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      min-height: 1.2em;
    }
    #start-btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: #e03030;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #start-btn:hover { background: #c02020; }
    #start-btn:disabled { background: #555; cursor: default; }
  </style>
</head>
<body>
  <video id="core-video" autoplay playsinline muted></video>

  <div id="start-ui" style="display:none">
    <h2>RedsssProduction Studios — Stream Core</h2>
    <p>Your browser blocked the automatic screen-share prompt. Click below to continue.</p>
    <button id="start-btn">Share Screen &amp; Go Live</button>
  </div>

  <div id="idle-ui">
    <h2>RedsssProduction Studios — Stream Core</h2>
    <p>Starting your stream...</p>
  </div>

  <div id="status">Preparing...</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/livekit-client.umd.min.js"></script>
  <script src="js/stream-core.js"></script>
</body>
</html>

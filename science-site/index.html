<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScienceDataPortal — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <!-- Animated Background -->
    <div class="login-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="floating-symbols">
            <span style="--i:0">⚛</span>
            <span style="--i:1">🔬</span>
            <span style="--i:2">🧬</span>
            <span style="--i:3">⚗️</span>
            <span style="--i:4">🔭</span>
            <span style="--i:5">🧪</span>
            <span style="--i:6">📐</span>
            <span style="--i:7">🌌</span>
            <span style="--i:8">💡</span>
            <span style="--i:9">🧲</span>
        </div>
    </div>

    <!-- Login Card -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-icon">
                    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                        <circle cx="28" cy="28" r="4" fill="#00d4ff"/>
                        <ellipse cx="28" cy="28" rx="24" ry="8" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.7"/>
                        <ellipse cx="28" cy="28" rx="24" ry="8" stroke="#7c4dff" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(60 28 28)"/>
                        <ellipse cx="28" cy="28" rx="24" ry="8" stroke="#00e676" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(120 28 28)"/>
                        <circle cx="4" cy="28" r="2.5" fill="#00d4ff" opacity="0.9"/>
                        <circle cx="40" cy="7.2" r="2.5" fill="#7c4dff" opacity="0.9"/>
                        <circle cx="40" cy="48.8" r="2.5" fill="#00e676" opacity="0.9"/>
                    </svg>
                </div>
                <h1>Science<span class="accent">Data</span>Portal</h1>
                <p class="tagline">Interactive Science Education Tools</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" autocomplete="on">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Sign In</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h12m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </form>

            <!-- Signup Form (hidden by default) -->
            <form id="signup-form" class="auth-form hidden" autocomplete="on">
                <div class="form-group">
                    <label for="signup-name">Display Name</label>
                    <input type="text" id="signup-name" placeholder="Your name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Create Account</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h12m0 0l-4-4m4 4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </form>

            <div class="auth-divider"><span>or continue with</span></div>

            <button id="google-signin" class="btn btn-google btn-full">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span>Google</span>
            </button>

            <div class="auth-footer">
                <p id="auth-toggle-text">Don't have an account? <a href="#" id="toggle-auth">Sign up</a></p>
            </div>

            <div id="auth-message" class="auth-message hidden"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'j') {
                e.preventDefault();
                window.location.href = 'https://redsss.sciencedataportal.com';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in with Clever...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="science_data_portal_fav_icon.png">
</head>
<body class="login-page">
    <!-- Animated Background -->
    <div class="login-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card" style="text-align:center; padding: 60px 32px;">
            <div class="login-brand" style="margin-bottom: 32px;">
                <div class="brand-icon">
                    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                        <circle cx="28" cy="28" r="4" fill="#00d4ff"/>
                        <ellipse cx="28" cy="28" rx="24" ry="8" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.7"/>
                        <ellipse cx="28" cy="28" rx="24" ry="8" stroke="#7c4dff" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(60 28 28)"/>
                        <ellipse cx="28" cy="28" rx="24" ry="8" stroke="#00e676" stroke-width="1.5" fill="none" opacity="0.7" transform="rotate(120 28 28)"/>
                    </svg>
                </div>
            </div>

            <div id="spinner" style="margin: 0 auto 20px; width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent-cyan); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
            <p id="status-msg" style="font-size:1rem; color:var(--text-secondary);">Signing you in with Clever...</p>
            <p id="error-detail" class="hidden" style="font-size:0.8rem; color:var(--text-muted); margin-top:8px;"></p>
            <a href="index.html" id="back-link" class="hidden" style="display:inline-block; margin-top:20px; font-size:0.875rem; color:var(--accent-cyan);">← Back to sign in</a>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        // -------------------------------------------------------
        // REPLACE THIS with your actual Cloudflare Worker URL
        // after you deploy the clever-auth Worker in Step 3.
        // -------------------------------------------------------
        var WORKER_URL = 'https://clever-auth.redcreeper1776.workers.dev';

        var statusMsg   = document.getElementById('status-msg');
        var errorDetail = document.getElementById('error-detail');
        var spinner     = document.getElementById('spinner');
        var backLink    = document.getElementById('back-link');

        function showError(message, detail) {
            spinner.style.display = 'none';
            statusMsg.textContent = message;
            statusMsg.style.color = '#ff8a9e';
            if (detail) {
                errorDetail.textContent = detail;
                errorDetail.classList.remove('hidden');
            }
            backLink.classList.remove('hidden');
            backLink.style.display = 'inline-block';
        }

        var code = new URLSearchParams(window.location.search).get('code');
        var error = new URLSearchParams(window.location.search).get('error');

        if (error) {
            showError('Clever sign-in was cancelled.', error);
        } else if (!code) {
            showError('Sign-in failed: no authorisation code returned from Clever.');
        } else {
            fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, redirectUri: window.location.origin + '/clever-callback.html' })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.error) throw new Error(data.error);
                statusMsg.textContent = 'Completing sign-in...';
                return auth.signInWithCustomToken(data.firebaseToken).then(function (cred) {
                    return db.collection('users').doc(cred.user.uid).set({
                        displayName: data.displayName || '',
                        email: data.email || '',
                        avatarUrl: '',
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });
            })
            .then(function () {
                window.location.href = 'app.html';
            })
            .catch(function (err) {
                showError('Sign-in failed.', err.message);
            });
        }
    </script>
</body>
</html>
